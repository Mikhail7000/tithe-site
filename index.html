<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Десятина и жертва в христианстве</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Docsify theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />

  <style>
    /* ── Base Variables ── */
    :root {
      --theme-color:  #6b4fa0;
      --bg-main:      #faf8f5;
      --bg-sidebar:   #f3f0ea;
      --bg-card:      #ffffff;
      --brown:        #7a5c3a;
      --brown-light:  #a07850;
      --brown-dim:    #c4a882;
      --purple:       #6b4fa0;
      --purple-light: #8b6fbf;
      --purple-dim:   #d4c8ee;
      --text-main:    #2c2416;
      --text-muted:   #8a7a68;
      --border:       #e0d8cc;
      --border-soft:  #ede8e0;
    }

    /* ── Reset & Body ── */
    * { box-sizing: border-box; }

    body {
      background: var(--bg-main) !important;
      color: var(--text-main) !important;
      font-family: 'Crimson Text', Georgia, serif !important;
      font-size: 18px;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg-sidebar) !important;
      border-right: 1px solid var(--border) !important;
      padding-top: 0 !important;
    }

    .sidebar::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--brown-dim), var(--brown), var(--brown-dim));
    }

    .app-name {
      padding: 28px 20px 20px !important;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      background: linear-gradient(180deg, #fff 0%, var(--bg-sidebar) 100%);
    }

    .app-name-link {
      font-family: 'Cinzel', serif !important;
      font-size: 0.82em !important;
      color: var(--purple) !important;
      text-decoration: none !important;
      line-height: 1.4;
      display: block;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .app-name-link::before {
      content: '✝';
      display: block;
      font-size: 1.8em;
      margin-bottom: 8px;
      color: var(--brown);
      opacity: 0.7;
    }

    .sidebar-nav {
      padding: 0 8px !important;
    }

    .sidebar-nav ul {
      padding: 0 !important;
      margin: 0 !important;
    }

    .sidebar-nav li {
      list-style: none !important;
      margin: 2px 0 !important;
    }

    .sidebar-nav > ul > li > a {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.75em !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      color: var(--purple) !important;
      padding: 8px 12px !important;
      display: block;
      border-radius: 6px;
      text-decoration: none !important;
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .sidebar-nav > ul > li > a:hover {
      background: var(--purple-dim) !important;
      border-left-color: var(--purple) !important;
      color: var(--purple) !important;
    }

    .sidebar-nav ul ul {
      padding-left: 16px !important;
    }

    .sidebar-nav ul ul a {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.73em !important;
      color: var(--text-muted) !important;
      padding: 5px 10px !important;
      display: block;
      border-radius: 4px;
      text-decoration: none !important;
      transition: all 0.2s ease;
    }

    .sidebar-nav ul ul a:hover {
      color: var(--purple) !important;
      background: var(--purple-dim) !important;
    }

    .sidebar-nav .active > a {
      color: var(--purple) !important;
      background: var(--purple-dim) !important;
      border-left: 2px solid var(--purple) !important;
    }

    /* ── Main Content ── */
    .content {
      background: var(--bg-main) !important;
    }

    .markdown-section {
      max-width: 820px !important;
      padding: 60px 60px 100px !important;
      color: var(--text-main) !important;
    }

    /* ── Typography ── */
    .markdown-section h1 {
      font-family: 'Cinzel', serif !important;
      font-size: 1.9em !important;
      font-weight: 700 !important;
      color: var(--purple) !important;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 12px !important;
      padding-bottom: 24px !important;
      border-bottom: none !important;
      position: relative;
    }

    .markdown-section h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--brown-dim), transparent);
      margin: 16px auto 0;
    }

    .markdown-section h2 {
      font-family: 'Cinzel', serif !important;
      font-size: 1.2em !important;
      font-weight: 600 !important;
      color: var(--purple) !important;
      margin-top: 56px !important;
      margin-bottom: 20px !important;
      padding: 14px 20px !important;
      background: linear-gradient(135deg, #f0ebf8, #f8f5ff) !important;
      border-left: 3px solid var(--purple) !important;
      border-radius: 0 8px 8px 0;
      border-bottom: none !important;
      letter-spacing: 0.02em;
      box-shadow: 0 1px 4px rgba(107,79,160,0.08);
    }

    .markdown-section h3 {
      font-family: 'Cinzel', serif !important;
      font-size: 0.95em !important;
      font-weight: 600 !important;
      color: var(--brown) !important;
      margin-top: 32px !important;
      margin-bottom: 12px !important;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .markdown-section p {
      font-family: 'Crimson Text', serif !important;
      font-size: 1.05em !important;
      line-height: 1.85 !important;
      color: var(--text-main) !important;
      margin-bottom: 16px !important;
    }

    .markdown-section strong {
      color: var(--brown) !important;
      font-weight: 600 !important;
    }

    /* ── Lists ── */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 24px !important;
    }

    .markdown-section li {
      font-family: 'Crimson Text', serif !important;
      font-size: 1.05em !important;
      line-height: 1.8 !important;
      color: var(--text-main) !important;
      margin-bottom: 6px !important;
    }

    .markdown-section ul li::marker {
      color: var(--brown-dim) !important;
    }

    .markdown-section ol li::marker {
      color: var(--purple) !important;
      font-family: 'Cinzel', serif !important;
      font-weight: 600;
    }

    /* ── Blockquote ── */
    .markdown-section blockquote {
      background: linear-gradient(135deg, #f5f0ff, #fdf8f0) !important;
      border-left: 4px solid var(--brown-dim) !important;
      border-radius: 0 12px 12px 0 !important;
      padding: 24px 28px !important;
      margin: 36px 0 !important;
      position: relative;
      box-shadow: 0 2px 12px rgba(107,79,160,0.07);
    }

    .markdown-section blockquote::before {
      content: '❝';
      position: absolute;
      top: -14px;
      left: 20px;
      font-size: 2.5em;
      color: var(--brown-dim);
      opacity: 0.6;
      line-height: 1;
    }

    .markdown-section blockquote p {
      font-family: 'Crimson Text', serif !important;
      font-size: 1.2em !important;
      font-style: italic !important;
      color: var(--brown) !important;
      margin: 0 !important;
      line-height: 1.7 !important;
    }

    /* ── Table ── */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 28px 0 !important;
      border-radius: 10px !important;
      overflow: hidden !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .markdown-section thead tr {
      background: linear-gradient(135deg, #f0ebf8, #e8e0f4) !important;
    }

    .markdown-section th {
      font-family: 'Cinzel', serif !important;
      font-size: 0.78em !important;
      font-weight: 600 !important;
      color: var(--purple) !important;
      padding: 14px 18px !important;
      text-align: left !important;
      letter-spacing: 0.06em !important;
      border-bottom: 1px solid var(--border) !important;
      text-transform: uppercase;
    }

    .markdown-section td {
      font-family: 'Crimson Text', serif !important;
      font-size: 1em !important;
      padding: 12px 18px !important;
      color: var(--text-main) !important;
      border-bottom: 1px solid var(--border-soft) !important;
    }

    .markdown-section tr:last-child td {
      border-bottom: none !important;
    }

    .markdown-section tbody tr {
      background: #fff !important;
      transition: background 0.2s;
    }

    .markdown-section tbody tr:hover {
      background: #f5f0ff !important;
    }

    /* ── Horizontal Rule ── */
    .markdown-section hr {
      border: none !important;
      height: 1px !important;
      background: linear-gradient(90deg, transparent, var(--border), transparent) !important;
      margin: 48px 0 !important;
    }

    /* ── Progress bar ── */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--purple), var(--brown-light));
      z-index: 9999;
      transition: width 0.2s ease;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--brown-dim); }

    /* ── Search ── */
    .search input {
      background: #fff !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      color: var(--text-main) !important;
      padding: 8px 14px !important;
      font-size: 0.8em !important;
      width: 100% !important;
      outline: none !important;
      margin: 8px 0 16px !important;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .search input:focus {
      border-color: var(--purple-light) !important;
      box-shadow: 0 0 0 3px var(--purple-dim) !important;
    }

    .search input::placeholder { color: var(--text-muted) !important; }

    .search-keyword {
      color: var(--purple) !important;
      font-weight: 600 !important;
    }

    /* ── Back to top ── */
    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      color: var(--purple);
      font-size: 1.2em;
      text-decoration: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .back-to-top.visible { opacity: 1; }

    .back-to-top:hover {
      background: var(--purple-dim);
      border-color: var(--purple-light);
      transform: translateY(-3px);
      box-shadow: 0 4px 16px rgba(107,79,160,0.2);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 32px 24px 80px !important;
      }
    }
  </style>
</head>

<body>
  <div id="app">Загрузка...</div>

  <!-- Back to top -->
  <a class="back-to-top" id="backToTop" href="#" title="Наверх">↑</a>

  <script>
    window.$docsify = {
      name: 'Десятина и жертва',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      repo: '',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Поиск...',
        noData: 'Ничего не найдено',
        depth: 4
      },
      plugins: [
        function(hook) {
          // Progress bar
          var bar = document.createElement('div');
          bar.className = 'progress-bar';
          document.body.appendChild(bar);

          hook.doneEach(function() {
            window.scrollTo(0, 0);
          });
        }
      ]
    }

    // Back to top visibility
    window.addEventListener('scroll', function() {
      var btn = document.getElementById('backToTop');
      if (window.scrollY > 300) {
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    });

    document.getElementById('backToTop').addEventListener('click', function(e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
