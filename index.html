<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Десятина и жертва в христианстве</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Docsify theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />

  <style>
    /* ── Base Variables ── */
    :root {
      --theme-color: #c9a84c;
      --bg-dark:     #0f0e0c;
      --bg-card:     #1a1814;
      --bg-sidebar:  #13120f;
      --gold:        #c9a84c;
      --gold-light:  #e8cc7a;
      --gold-dim:    #7a6330;
      --text-main:   #e8e0d0;
      --text-muted:  #9b9080;
      --border:      #2e2a22;
      --accent:      #8b4513;
      --purple:      #6b4fa0;
    }

    /* ── Reset & Body ── */
    * { box-sizing: border-box; }

    body {
      background: var(--bg-dark) !important;
      color: var(--text-main) !important;
      font-family: 'Crimson Text', Georgia, serif !important;
      font-size: 18px;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg-sidebar) !important;
      border-right: 1px solid var(--border) !important;
      padding-top: 0 !important;
    }

    .sidebar::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
    }

    .app-name {
      padding: 28px 20px 20px !important;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .app-name-link {
      font-family: 'Cinzel', serif !important;
      font-size: 0.85em !important;
      color: var(--gold) !important;
      text-decoration: none !important;
      line-height: 1.4;
      display: block;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .app-name-link::before {
      content: '✝';
      display: block;
      font-size: 1.8em;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .sidebar-nav {
      padding: 0 8px !important;
    }

    .sidebar-nav ul {
      padding: 0 !important;
      margin: 0 !important;
    }

    .sidebar-nav li {
      list-style: none !important;
      margin: 2px 0 !important;
    }

    .sidebar-nav > ul > li > a {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.78em !important;
      font-weight: 500 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      color: var(--gold) !important;
      padding: 8px 12px !important;
      display: block;
      border-radius: 6px;
      text-decoration: none !important;
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .sidebar-nav > ul > li > a:hover {
      background: rgba(201, 168, 76, 0.08) !important;
      border-left-color: var(--gold) !important;
      color: var(--gold-light) !important;
    }

    .sidebar-nav ul ul {
      padding-left: 16px !important;
    }

    .sidebar-nav ul ul a {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.75em !important;
      color: var(--text-muted) !important;
      padding: 5px 10px !important;
      display: block;
      border-radius: 4px;
      text-decoration: none !important;
      transition: all 0.2s ease;
    }

    .sidebar-nav ul ul a:hover {
      color: var(--gold-light) !important;
      background: rgba(201, 168, 76, 0.06) !important;
    }

    .sidebar-nav .active > a {
      color: var(--gold-light) !important;
      background: rgba(201, 168, 76, 0.12) !important;
      border-left: 2px solid var(--gold) !important;
    }

    /* ── Main Content ── */
    .content {
      background: var(--bg-dark) !important;
    }

    .markdown-section {
      max-width: 820px !important;
      padding: 60px 60px 100px !important;
      color: var(--text-main) !important;
    }

    /* ── Typography ── */
    .markdown-section h1 {
      font-family: 'Cinzel', serif !important;
      font-size: 2em !important;
      font-weight: 700 !important;
      color: var(--gold) !important;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 12px !important;
      padding-bottom: 24px !important;
      border-bottom: none !important;
      position: relative;
    }

    .markdown-section h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto 0;
    }

    .markdown-section h2 {
      font-family: 'Cinzel', serif !important;
      font-size: 1.25em !important;
      font-weight: 600 !important;
      color: var(--gold-light) !important;
      margin-top: 56px !important;
      margin-bottom: 20px !important;
      padding: 16px 20px !important;
      background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03)) !important;
      border-left: 3px solid var(--gold) !important;
      border-radius: 0 8px 8px 0;
      border-bottom: none !important;
      letter-spacing: 0.03em;
    }

    .markdown-section h3 {
      font-family: 'Cinzel', serif !important;
      font-size: 1em !important;
      font-weight: 600 !important;
      color: var(--gold-dim) !important;
      margin-top: 32px !important;
      margin-bottom: 12px !important;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .markdown-section p {
      font-family: 'Crimson Text', serif !important;
      font-size: 1.05em !important;
      line-height: 1.85 !important;
      color: var(--text-main) !important;
      margin-bottom: 16px !important;
    }

    .markdown-section strong {
      color: var(--gold-light) !important;
      font-weight: 600 !important;
    }

    /* ── Lists ── */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 24px !important;
    }

    .markdown-section li {
      font-family: 'Crimson Text', serif !important;
      font-size: 1.05em !important;
      line-height: 1.8 !important;
      color: var(--text-main) !important;
      margin-bottom: 6px !important;
    }

    .markdown-section ul li::marker {
      color: var(--gold-dim) !important;
    }

    .markdown-section ol li::marker {
      color: var(--gold) !important;
      font-family: 'Cinzel', serif !important;
      font-weight: 600;
    }

    /* ── Blockquote ── */
    .markdown-section blockquote {
      background: linear-gradient(135deg, rgba(201,168,76,0.06), rgba(107,79,160,0.06)) !important;
      border-left: 4px solid var(--gold) !important;
      border-radius: 0 12px 12px 0 !important;
      padding: 24px 28px !important;
      margin: 36px 0 !important;
      position: relative;
    }

    .markdown-section blockquote::before {
      content: '❝';
      position: absolute;
      top: -12px;
      left: 20px;
      font-size: 2.5em;
      color: var(--gold);
      opacity: 0.4;
      line-height: 1;
    }

    .markdown-section blockquote p {
      font-family: 'Crimson Text', serif !important;
      font-size: 1.2em !important;
      font-style: italic !important;
      color: var(--gold-light) !important;
      margin: 0 !important;
      line-height: 1.7 !important;
    }

    /* ── Table ── */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 28px 0 !important;
      border-radius: 10px !important;
      overflow: hidden !important;
      border: 1px solid var(--border) !important;
    }

    .markdown-section thead tr {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08)) !important;
    }

    .markdown-section th {
      font-family: 'Cinzel', serif !important;
      font-size: 0.8em !important;
      font-weight: 600 !important;
      color: var(--gold) !important;
      padding: 14px 18px !important;
      text-align: left !important;
      letter-spacing: 0.06em !important;
      border-bottom: 1px solid var(--border) !important;
      text-transform: uppercase;
    }

    .markdown-section td {
      font-family: 'Crimson Text', serif !important;
      font-size: 1em !important;
      padding: 12px 18px !important;
      color: var(--text-main) !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .markdown-section tr:last-child td {
      border-bottom: none !important;
    }

    .markdown-section tbody tr {
      background: rgba(255,255,255,0.01) !important;
      transition: background 0.2s;
    }

    .markdown-section tbody tr:hover {
      background: rgba(201,168,76,0.05) !important;
    }

    /* ── Horizontal Rule ── */
    .markdown-section hr {
      border: none !important;
      height: 1px !important;
      background: linear-gradient(90deg, transparent, var(--border), transparent) !important;
      margin: 48px 0 !important;
    }

    /* ── Cover / Intro hero ── */
    #cover-page {
      text-align: center;
      padding: 60px 0 40px;
    }

    /* ── Progress bar ── */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      z-index: 9999;
      transition: width 0.2s ease;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    /* ── Search ── */
    .search input {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      color: var(--text-main) !important;
      padding: 8px 14px !important;
      font-size: 0.8em !important;
      width: 100% !important;
      outline: none !important;
      margin: 8px 0 16px !important;
    }

    .search input:focus {
      border-color: var(--gold-dim) !important;
      background: rgba(201,168,76,0.04) !important;
    }

    .search input::placeholder { color: var(--text-muted) !important; }

    .search-keyword {
      color: var(--gold) !important;
      font-weight: 600 !important;
    }

    /* ── Back to top ── */
    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      color: var(--gold);
      font-size: 1.2em;
      text-decoration: none;
    }

    .back-to-top.visible {
      opacity: 1;
    }

    .back-to-top:hover {
      background: rgba(201,168,76,0.15);
      border-color: var(--gold-dim);
      transform: translateY(-3px);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 32px 24px 80px !important;
      }
    }
  </style>
</head>

<body>
  <div id="app">Загрузка...</div>

  <!-- Back to top -->
  <a class="back-to-top" id="backToTop" href="#" title="Наверх">↑</a>

  <script>
    window.$docsify = {
      name: 'Десятина и жертва',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      repo: '',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Поиск...',
        noData: 'Ничего не найдено',
        depth: 4
      },
      plugins: [
        function(hook) {
          // Progress bar
          var bar = document.createElement('div');
          bar.className = 'progress-bar';
          document.body.appendChild(bar);

          hook.doneEach(function() {
            window.scrollTo(0, 0);
          });
        }
      ]
    }

    // Back to top visibility
    window.addEventListener('scroll', function() {
      var btn = document.getElementById('backToTop');
      if (window.scrollY > 300) {
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    });

    document.getElementById('backToTop').addEventListener('click', function(e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
